pseudocode

* stretch goals
copy on click
toggle numbers off
toggle symbols off

* ability to set password length

** css
'generate-pass-div' make in-to flex
 -->
<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/css/index.css">
    </head>
    <body>
        <div class="main-content">
            <h1>
                <span class='white'>Generate a </span> <span class='green'>random password</span>
            </h1>
            <h2 class="h1-subtitle">Never use an insecure password again.</h2>
        </div>
        <div class="generate-pass-div">
            <button class="gen-pass-btn">Generate passwords</button>
            <input type="text" class="user-input-inp" placeholder="12, 13, 14 or 15 character password? Type here.">
        </div>
        <hr class="horizontal-line">
        <div class="pass-display-div">
            <div class="pass-display-1"></div>
            <div class="pass-display-2"></div>
        </div>
        <script src="/js/index.js" defer></script>
    </body>
</html>
